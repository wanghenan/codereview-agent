# CodeReview Agent Configuration
# ==============================

# LLM Configuration
llm:
  provider: minimax
  apiKey: ${{ secrets.LLM_API_KEY }}
  model: abab6.5s-chat

# Critical paths - high risk areas
criticalPaths:
  - python/src/codereview

# Exclude patterns
excludePatterns:
  - "*.test.py"
  - "**/__pycache__/**"
  - ".venv/**"
  - "node_modules/**"

# Cache configuration
cache:
  ttl: 7
  forceRefresh: false

# Output configuration
output:
  prComment: true
  reportPath: .codereview-agent/output
  reportFormat: markdown
  autoMerge:
    enabled: false  # Default off - must be explicitly enabled
    filePatterns: []  # Optional: limit to specific files, e.g., ["src/*.py", "*.js"]
    conditions:
      minConfidence: 90  # Minimum confidence percentage
      maxSeverity: low  # Maximum risk level: low, medium, high
      requireApproval: true  # Require at least 1 approval
