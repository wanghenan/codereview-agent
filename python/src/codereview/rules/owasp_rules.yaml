# CodeReview Agent Risk Detection Rules
# OWASP Top 10 Security Rules
#
# This file contains built-in security rules based on OWASP Top 10.
# Users can extend this file or create custom rule files.
#
# Rule format:
# - id: Unique identifier
# - name: Human-readable name
# - pattern: Regex pattern to match
# - severity: high, medium, low
# - description: What the rule detects
# - suggestion: How to fix

rules:
  # A01:2021 - Broken Access Control
  - id: OWASP-A01-001
    name: Hardcoded credentials detected
    pattern: "(password|passwd|pwd|secret|api_key|apikey)\\s*[:=]\\s*['\"][^'\"]{4,}['\"]"
    severity: high
    description: "Hardcoded credentials found. This is a critical security issue."
    suggestion: "Use environment variables or a secure secrets management system."

  - id: OWASP-A01-002
    name: JWT token in URL
    pattern: "[?&](token|jwt|access_token)=[A-Za-z0-9-_\\.]+"
    severity: high
    description: "Sensitive token detected in URL query parameters."
    suggestion: "Use Authorization header instead."

  - id: OWASP-A01-003
    name: SQL injection risk
    pattern: "execute|exec\\(|query\\(|cursor\\.execute\\([^)]*%s|\\+.*['\"].*(SELECT|INSERT|UPDATE|DELETE|UNION)"
    severity: high
    description: "Potential SQL injection vulnerability detected."
    suggestion: "Use parameterized queries or prepared statements."

  # A02:2021 - Cryptographic Failures
  - id: OWASP-A02-001
    name: Weak cryptographic algorithm
    pattern: "md5|sha1|des\\(|rc4|cipher\\s*=\\s*['\"]DES"
    severity: high
    description: "Weak cryptographic algorithm detected."
    suggestion: "Use AES-256 or stronger algorithms."

  - id: OWASP-A02-002
    name: Hardcoded encryption key
    pattern: "(encryption_key|encrypt_key|crypto_key|secret_key)\\s*[:=]\\s*['\"][^'\"]{8,}['\"]"
    severity: high
    description: "Hardcoded encryption key detected."
    suggestion: "Use a secure key management service."

  - id: OWASP-A02-003
    name: Insecure random
    pattern: "random\\.random\\(\\)|Math\\.random\\(\\)|Math\\.floor\\(Math\\.random\\(\\)"
    severity: medium
    description: "Using insecure random for security-sensitive operations."
    suggestion: "Use secrets.token_bytes() or crypto.getRandomValues()."

  # A03:2021 - Injection
  - id: OWASP-A03-001
    name: Command injection risk
    pattern: "os\\.system|subprocess\\.call|subprocess\\.run|exec\\(|shell=True"
    severity: high
    description: "Potential command injection vulnerability."
    suggestion: "Avoid shell=True, validate and sanitize all inputs."

  - id: OWASP-A03-002
    name: XSS vulnerability risk
    pattern: "innerHTML\\s*=|\\.html\\(|\\.innerHTML\\s*="
    severity: high
    description: "Potential Cross-Site Scripting (XSS) vulnerability."
    suggestion: "Use textContent instead of innerHTML, or sanitize inputs."

  - id: OWASP-A03-003
    name: Template injection risk
    pattern: "\\{\\{.*\\}\\}|\\{%.*%\\}|<%.*%>"
    severity: high
    description: "Potential template injection vulnerability."
    suggestion: "Use secure templating and sanitize inputs."

  # A04:2021 - Insecure Design
  - id: OWASP-A04-001
    name: Missing authentication check
    pattern: "def\\s+\\w+.*\\):[^}]*pass[^}]*$|async\\s+def\\s+\\w+.*\\):[^}]*pass"
    severity: high
    description: "Function with pass statement - possible missing implementation."
    suggestion: "Implement proper authentication logic."

  # A05:2021 - Security Misconfiguration
  - id: OWASP-A05-001
    name: Debug mode enabled
    pattern: "DEBUG\\s*[:=]\\s*True|debug:\\s*true|app\\.run\\(\\s*debug\\s*=\\s*True"
    severity: high
    description: "Debug mode is enabled in production code."
    suggestion: "Disable debug mode in production."

  - id: OWASP-A05-002
    name: CORS allow all
    pattern: "Access-Control-Allow-Origin.*\\*|ALLOWED_HOSTS\\s*=\\s*\\['\\*'\\]"
    severity: medium
    description: "CORS configured to allow all origins."
    suggestion: "Restrict CORS to specific trusted origins."

  - id: OWASP-A05-003
    name: Insecure SSL verification disabled
    pattern: "verify\\s*=\\s*False|SSL_VERIFY\\s*=\\s*False|disable_ssl"
    severity: high
    description: "SSL verification is disabled."
    suggestion: "Enable SSL verification in production."

  # A06:2021 - Vulnerable and Outdated Components
  - id: OWASP-A06-001
    name: Outdated dependency
    pattern: "(requests<|lodash<|moment<|axios<|jquery<)\\s*[0-9]"
    severity: medium
    description: "Potential outdated dependency with known vulnerabilities."
    suggestion: "Update to the latest stable version."

  # A07:2021 - Identification and Authentication Failures
  - id: OWASP-A07-001
    name: Weak password policy
    pattern: "password\\s*[:=]\\s*['\"](?!.*\\d)(?!.*[a-zA-Z]).{4,}['\"]"
    severity: medium
    description: "Weak password detected."
    suggestion: "Enforce strong password policies."

  - id: OWASP-A07-002
    name: Session fixation
    pattern: "session\\s*=\\s*request\\.cookie|SessionID.*="
    severity: medium
    description: "Potential session fixation vulnerability."
    suggestion: "Regenerate session ID after login."

  # A08:2021 - Software and Data Integrity Failures
  - id: OWASP-A08-001
    name: Insecure deserialization
    pattern: "pickle\\.loads?|yaml\\.load\\(|eval\\(|unserialize\\("
    severity: high
    description: "Insecure deserialization detected."
    suggestion: "Use safe serialization formats like JSON."

  - id: OWASP-A08-002
    name: Unverified CDN/resource
    pattern: "cdn\\.jsdelivr\\.net|cdnjs\\.cloudflare\\.com|unpkg\\.com"
    severity: low
    description: "Loading resources from CDN without integrity check."
    suggestion: "Add SRI (Subresource Integrity) hashes."

  # A09:2021 - Security Logging and Monitoring Failures
  - id: OWASP-A09-001
    name: Missing error handling
    pattern: "except:\\s*$|except\\s*$|catch\\s*\\(\\s*\\)\\s*\\{"
    severity: medium
    description: "Empty or generic exception handler detected."
    suggestion: "Log the error and handle it appropriately."

  - id: OWASP-A09-002
    name: Sensitive data in logs
    pattern: "log\\(.*password|log\\(.*token|console\\.log\\(.*secret"
    severity: high
    description: "Sensitive data may be logged."
    suggestion: "Avoid logging sensitive information."

  # A10:2021 - Server-Side Request Forgery (SSRF)
  - id: OWASP-A10-001
    name: Unvalidated URL fetch
    pattern: "requests\\.(get|post)\\(|fetch\\(|urllib\\.(request\\.)?"
    severity: medium
    description: "URL fetch without validation."
    suggestion: "Validate and whitelist allowed URLs."

  - id: OWASP-A10-002
    name: SSRF risk with user input
    pattern: "url.*=.*request\\.|url.*=.*params|url.*=.*query"
    severity: high
    description: "Potential Server-Side Request Forgery (SSRF) vulnerability."
    suggestion: "Validate and restrict URL schemes and hosts."

# Language-specific rules
language_rules:
  python:
    - id: PY-001
      name: Pickle deserialization
      pattern: "pickle\\.(load|loads|load\\s*\\()"
      severity: high
      description: "Using pickle for deserialization is insecure."
      suggestion: "Use JSON or a safe serialization format."

    - id: PY-002
      name: Use of eval()
      pattern: "\\beval\\s*\\("
      severity: high
      description: "eval() is dangerous and can lead to code execution."
      suggestion: "Avoid eval(), use ast.literal_eval for safe parsing."

    - id: PY-003
      name: Hardcoded path
      pattern: "path\\s*=\\s*['\"]/[a-zA-Z0-9_/]+['\"]"
      severity: low
      description: "Hardcoded file path detected."
      suggestion: "Use relative paths or environment variables."

  javascript:
    - id: JS-001
      name: eval() usage
      pattern: "\\beval\\s*\\("
      severity: high
      description: "eval() is dangerous and can lead to XSS."
      suggestion: "Avoid eval(), use JSON.parse() for JSON."

    - id: JS-002
      name: Console log with sensitive data
      pattern: "console\\.(log|error|warn)\\([^)]*(password|token|secret|key)[^)]*\\)"
      severity: medium
      description: "Potential sensitive data in console output."
      suggestion: "Remove sensitive data from console logs."

    - id: JS-003
      name: Hardcoded API endpoint
      pattern: "const\\s+\\w*[Uu]rl\\s*=\\s*['\"][^'\"]+['\"]|const\\s+\\w*[Ee]ndpoint"
      severity: low
      description: "Hardcoded API endpoint detected."
      suggestion: "Use environment variables for API endpoints."

  java:
    - id: JAVA-001
      name: SQL injection with Statement
      pattern: "Statement\\s+\\w+\\s*=.*createStatement|\\.executeQuery\\([^)]*\\+"
      severity: high
      description: "Potential SQL injection using Statement."
      suggestion: "Use PreparedStatement instead."

    - id: JAVA-002
      name: Hardcoded password
      pattern: "String\\s+password\\s*=\\s*['\"][^'\"]+['\"]"
      severity: high
      description: "Hardcoded password detected."
      suggestion: "Use a secure password vault or environment variables."
